services:
  mysql-server:
    image: mysql:8.0
    container_name: url-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: url
    ports:
      - "13306:3306"
    volumes:
      - /home/singdile/.local/share/short-link/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: url-redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
  db-migration:
    image: migrate/migrate:v4.17.0
    container_name: mysql_migration
    volumes:
      - ./migrations:/migrations
    depends_on:
      mysql-server:
        condition: service_healthy
    command:
      - -path=/migrations
      - -database=mysql://root:123456@tcp(mysql-server:3306)/url
      - up

  shortlink-api:
    build: .
    container_name: shortlink-api
    restart: always
    ports:
      - "8888:8888"
    depends_on:
      mysql-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migration:
        condition: service_completed_successfully

volumes:
  redis-data:
