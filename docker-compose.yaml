services:
  mysql-server:
    image: mysql:8.0
    container_name: url-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: url
    ports:
      - "13306:3306"
    volumes:
      - /home/singdile/.local/share/short-link/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  db-migration:
    image: migrate/migrate:v4.17.0
    container_name: mysql_migration
    volumes:
      - ./migrations:/migrations
    depends_on:
      mysql-server:
        condition: service_healthy
    command:
      - -path=/migrations
      - -database=mysql://root:123456@tcp(mysql-server:3306)/url
      - up
